<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>飞翔的小鸟</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: url('https://source.unsplash.com/random/1920x1080/?nature') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #welcome-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        #welcome-screen h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px #000;
        }
        #welcome-screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        #start-btn-welcome {
            padding: 12px 30px;
            font-size: 1.2rem;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        #start-btn-welcome:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="welcome-screen">
        <h1>飞翔的小鸟</h1>
        <p>点击开始按钮，让小鸟飞向天空吧！</p>
        <button id="start-btn-welcome">开始游戏</button>
    </div>
    <div id="game-container">
        <canvas id="game-canvas" width="400" height="600"></canvas>
        <div id="ui">
            <button id="start-btn">开始游戏</button>
            <button id="pause-btn">暂停游戏</button>
            <div id="score">得分: 0</div>
            <div id="history">历史记录:</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
